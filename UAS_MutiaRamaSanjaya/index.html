<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Form Pendaftaran Mahasiswa Baru</h2>
        
        <form id="regForm" novalidate>
            <div class="form-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" name="nim">
                <span class="error-msg" id="error-nim"></span>
            </div>

            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama">
                <span class="error-msg" id="error-nama"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <span class="error-msg" id="error-email"></span>
            </div>

            <div class="form-group">
                <label for="hp">Nomor HP</label>
                <input type="text" id="hp" name="hp">
                <span class="error-msg" id="error-hp"></span>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
                    <label><input type="radio" name="gender" value="Perempuan"> Perempuan</label>
                </div>
                <span class="error-msg" id="error-gender"></span>
            </div>

            <div class="form-group">
                <label for="prodi">Program Studi</label>
                <select id="prodi" name="prodi">
                    <option value="">-- Pilih Program Studi --</option>
                    <option value="Teknik Informatika">Teknik Informatika</option>
                    <option value="Sistem Informasi">Sistem Informasi</option>
                    <option value="Manajemen Informatika">Manajemen Informatika</option>
                </select>
                <span class="error-msg" id="error-prodi"></span>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat</label>
                <textarea id="alamat" name="alamat" rows="3"></textarea>
                <span class="error-msg" id="error-alamat"></span>
            </div>

            <div class="form-group">
                <label for="foto">Pas Foto (JPG, JPEG, PNG - Max 2MB)</label>
                <input type="file" id="foto" name="foto" accept=".jpg, .jpeg, .png">
                <span class="error-msg" id="error-foto"></span>
                <div id="preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Pratinjau Foto">
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" id="btnSubmit">Submit</button>
                <button type="reset" id="btnReset">Reset</button>
            </div>
        </form>

        <div id="summaryCard" class="card" style="display: none;">
            <h3>Kartu Hasil Pendaftaran</h3>
            <hr>
            <div class="card-content">
                <div class="card-photo">
                    <img id="resFoto" src="" alt="Foto Mahasiswa">
                </div>
                <div class="card-details">
                    <p><strong>NIM:</strong> <span id="resNim"></span></p>
                    <p><strong>Nama Lengkap:</strong> <span id="resNama"></span></p>
                    <p><strong>Email:</strong> <span id="resEmail"></span></p>
                    <p><strong>Nomor HP:</strong> <span id="resHp"></span></p>
                    <p><strong>Jenis Kelamin:</strong> <span id="resGender"></span></p>
                    <p><strong>Program Studi:</strong> <span id="resProdi"></span></p>
                    <p><strong>Alamat:</strong> <span id="resAlamat"></span></p>
                </div>
            </div>
            <hr>
            <button id="btnEdit">Edit Data</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
